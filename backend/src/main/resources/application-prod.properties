# ── Banco Supabase (via variáveis de ambiente) ─────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── HikariCP (Supabase PgBouncer) ──────────────────────────────
# -1 = não crasha na inicialização se o banco estiver indisponível
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

# ── JWT ────────────────────────────────────────────────────────
webbeaga.jwt.secret=${JWT_SECRET}
webbeaga.jwt.expiration=86400000

# ── Upload ─────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ── Log ────────────────────────────────────────────────────────
logging.level.com.webbeaga=INFO
